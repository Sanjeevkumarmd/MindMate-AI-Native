    <line x1="60" y1="3" x2="60" y2="8" stroke="#22c55e" stroke-width="2"/>
    <line x1="57.5" y1="5.5" x2="62.5" y2="5.5" stroke="#22c55e" stroke-width="2"/>
    <line x1="45" y1="-2" x2="45" y2="2" stroke="#22c55e" stroke-width="2"/>
    <line x1="42.5" y1="0" x2="47.5" y2="0" stroke="#22c55e" stroke-width="2"/>
