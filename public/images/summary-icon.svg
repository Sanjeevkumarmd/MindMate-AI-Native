<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="#f0f0f0"/>
  <!-- Clipboard -->
  <rect x="50" y="40" width="100" height="130" rx="10" fill="white" stroke="#666" stroke-width="3"/>
  <!-- Clip -->
  <rect x="70" y="30" width="60" height="20" rx="5" fill="#999"/>
  <!-- Lines -->
  <line x1="70" y1="80" x2="130" y2="80" stroke="#ccc" stroke-width="3" stroke-linecap="round"/>
  <line x1="70" y1="100" x2="130" y2="100" stroke="#ccc" stroke-width="3" stroke-linecap="round"/>
  <line x1="70" y1="120" x2="110" y2="120" stroke="#ccc" stroke-width="3" stroke-linecap="round"/>
  <line x1="70" y1="140" x2="120" y2="140" stroke="#ccc" stroke-width="3" stroke-linecap="round"/>
  <!-- Pen -->
  <g transform="translate(120, 60) rotate(45)">
    <rect x="0" y="0" width="12" height="60" rx="2" fill="#4f46E5"/>
    <polygon points="0,60 12,60 6,75" fill="#4f46E5"/>
  </g>
</svg>
